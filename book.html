<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>라희의 독서 룸 | Book Gallery</title>
    <!-- Fonts -->
    <link rel="stylesheet" href="assets/css/main_style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Square+Round:wght@400;700;800&family=Do+Hyeon&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        .gallery-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--white);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .gallery-header {
            text-align: center;
            padding: 20px 20px 10px 20px;
            border-bottom: 2px dashed #e2e8f0;
            margin-bottom: 20px;
        }

        .gallery-header h1 {
            font-family: 'Outfit', 'Nanum Square Round', sans-serif;
            font-size: 2rem;
            color: #0f172a;
            margin-bottom: 10px;
        }

        .gallery-header p {
            color: var(--text-light);
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .book-viewer {
            position: relative;
            background: #f1f5f9;
            border-radius: 16px;
            overflow: hidden;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            cursor: pointer;
        }

        .book-image {
            max-width: 100%;
            height: auto;
            max-height: 70vh;
            object-fit: contain;
            box-shadow: var(--shadow-sm);
            border-radius: 4px;
            user-select: none;
            transition: opacity 0.3s ease;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }

        .btn-page {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: rgba(226, 232, 240, 0.8);
            color: #475569;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: all 0.2s;
            z-index: 10;
        }
        
        .btn-page.prev { left: 10px; }
        .btn-page.next { right: 10px; }

        .btn-page:hover:not(:disabled) {
            background: rgba(203, 213, 225, 0.9);
            color: #1e293b;
            transform: translateY(-50%) scale(1.1);
        }
        
        .btn-page:active:not(:disabled) {
            transform: translateY(-50%) scale(0.95);
        }

        .btn-page:disabled {
            background: rgba(241, 245, 249, 0.5);
            color: #cbd5e1;
            cursor: not-allowed;
            box-shadow: none;
        }

        .page-indicator {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-main);
            background: #fdf4ff;
            color: #db2777;
            padding: 8px 24px;
            border-radius: 20px;
        }

        .back-nav {
            margin-bottom: 20px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-light);
            text-decoration: none;
            font-weight: 800;
            padding: 10px 16px;
            background: var(--white);
            border-radius: 50px;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }

        .btn-back:hover {
            color: #0f172a;
            transform: translateX(-4px);
            box-shadow: var(--shadow-md);
        }
        
        .swipe-hint {
            position: absolute;
            bottom: 20px;
            font-size: 0.85rem;
            color: var(--text-light);
            background: rgba(255, 255, 255, 0.9);
            padding: 6px 14px;
            border-radius: 50px;
            pointer-events: none;
            font-weight: 700;
        }
        
        /* ProgressBar */
        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: #db2777;
            width: 0%;
            transition: width 0.3s ease;
        }

        @media (max-width: 768px) {
            .gallery-container { padding: 15px; border-radius: 16px; }
            .book-viewer { padding: 10px; min-height: 300px; }
            .btn-page { width: 44px; height: 44px; font-size: 1rem; }
            .page-indicator { font-size: 1rem; padding: 6px 16px; }
        }

        /* --- Quote Section --- */
        .quote-section {
            background: linear-gradient(135deg, #fdf4ff, #fae8ff);
            border-radius: 24px;
            padding: 30px;
            margin: 40px auto;
            max-width: 800px;
            text-align: center;
            box-shadow: var(--shadow-md);
            position: relative;
        }

        .quote-icon {
            font-size: 2.5rem;
            color: #d8b4fe;
            margin-bottom: 15px;
        }

        .quote-text {
            font-family: 'Nanum Square Round', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            color: #4c1d95;
            line-height: 1.6;
            margin-bottom: 15px;
            word-break: keep-all;
        }

        .quote-author {
            font-size: 1.05rem;
            color: #7e22ce;
            font-weight: 700;
        }

        /* --- Shorts Section --- */
        .shorts-section {
            margin: 0 auto 40px auto;
            max-width: 1000px;
            background: var(--white);
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--shadow-md);
        }

        .section-title {
            font-family: 'Outfit', 'Nanum Square Round', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .shorts-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 15px;
            scrollbar-width: thin;
        }
        
        .shorts-container::-webkit-scrollbar {
            height: 8px;
        }
        .shorts-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .short-card {
            flex: 0 0 220px; /* Fixed width for standard 9:16 short ratio */
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            aspect-ratio: 9/16;
            transition: transform 0.3s;
        }
        
        .short-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        /* Placeholder UI for Shorts */
        .placeholder-short {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .bg-gradient-1 { background: linear-gradient(135deg, #f43f5e, #fb923c); }
        .bg-gradient-2 { background: linear-gradient(135deg, #8b5cf6, #3b82f6); }
        .bg-gradient-3 { background: linear-gradient(135deg, #10b981, #3b82f6); }

        .short-thumbnail {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            width: 100%;
            height: 100%;
        }

        .short-thumbnail i {
            font-size: 3.5rem;
            opacity: 0.9;
        }

        .short-thumbnail span {
            font-weight: 800;
            font-size: 1.15rem;
            line-height: 1.4;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        @media (max-width: 768px) {
            .quote-text { font-size: 1.2rem; }
            .shorts-section { padding: 20px; }
            .short-card { flex: 0 0 180px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 네비게이션 -->
        <div class="back-nav">
            <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> 메인으로 돌아가기</a>
        </div>

        <div class="gallery-container">
            <div class="gallery-header">
                <h1>📚 추천 도서 갤러리</h1>
                <p>가볍게 책장을 넘기며 이야기 속으로 빠져보아요!</p>
            </div>
            
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="book-viewer" id="bookViewer">
                <button class="btn-page prev" id="btnPrev" onclick="changePage(-1); event.stopPropagation();" title="이전 페이지"><i class="fas fa-chevron-left"></i></button>
                <img src="assets/images/book1/9791199496651_01.jpg" alt="Book Page" class="book-image" id="bookImage">
                <div class="swipe-hint" id="swipeHint"><i class="fas fa-hand-pointer"></i> 좌우로 밀어서(스와이프) 넘기기</div>
                <button class="btn-page next" id="btnNext" onclick="changePage(1); event.stopPropagation();" title="다음 페이지"><i class="fas fa-chevron-right"></i></button>
            </div>

            <div class="controls">
                <div class="page-indicator" id="pageIndicator">1 / 9</div>
            </div>
        </div>

        <!-- 명언 섹션 -->
        <div class="quote-section">
            <div class="quote-icon"><i class="fas fa-quote-left"></i></div>
            <div class="quote-text">"당신이 읽은 책들이 모여, 반짝이는 당신의 미래를 만듭니다."</div>
            <div class="quote-author">- 오늘의 독서 명언 -</div>
        </div>

        <!-- 숏츠 섹션 -->
        <div class="shorts-section">
            <h2 class="section-title"><i class="fab fa-youtube" style="color: #ef4444;"></i> 추천 북 숏츠</h2>
            <div class="shorts-container">
                
                <!-- Short Placeholder 1 -->
                <div class="short-card placeholder-short bg-gradient-1">
                    <div class="short-thumbnail">
                        <i class="fas fa-play-circle"></i>
                        <span>이번 주 꼭<br>읽어야 할 책 TOP 3</span>
                    </div>
                </div>
                
                <!-- Short Placeholder 2 -->
                <div class="short-card placeholder-short bg-gradient-2">
                    <div class="short-thumbnail">
                        <i class="fas fa-play-circle"></i>
                        <span>1분 만에 보는<br>책 요약 감상평</span>
                    </div>
                </div>

                <!-- Short Placeholder 3 -->
                <div class="short-card placeholder-short bg-gradient-3">
                    <div class="short-thumbnail">
                        <i class="fas fa-play-circle"></i>
                        <span>베스트셀러 작가의<br>성공 조언</span>
                    </div>
                </div>

            </div>
        </div>

        <div class="footer-bar">
            <span>&copy; 2026 Rahee's Premium Study Room</span>
        </div>
    </div>

    <script>
        const imageFiles = [
            "assets/images/book1/9791199496651_01.jpg",
            "assets/images/book1/9791199496651_02.jpg",
            "assets/images/book1/9791199496651_03.jpg",
            "assets/images/book1/9791199496651_04.jpg",
            "assets/images/book1/9791199496651_05.jpg",
            "assets/images/book1/9791199496651_06.jpg",
            "assets/images/book1/9791199496651_07.jpg",
            "assets/images/book1/9791199496651_08.jpg",
            "assets/images/book1/9791199496651_09.jpg"
        ];
        
        let currentPageIndex = 0;
        
        const bookImage = document.getElementById('bookImage');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const pageIndicator = document.getElementById('pageIndicator');
        const progressBar = document.getElementById('progressBar');
        const bookViewer = document.getElementById('bookViewer');
        const swipeHint = document.getElementById('swipeHint');

        // 이미지 미리 로딩
        setTimeout(() => {
            imageFiles.forEach(src => {
                const img = new Image();
                img.src = src;
            });
        }, 1000);

        function updateUI() {
            // 부드러운 전환 효과
            bookImage.style.opacity = '0.5';
            
            setTimeout(() => {
                bookImage.src = imageFiles[currentPageIndex];
                bookImage.style.opacity = '1';
            }, 100);

            pageIndicator.textContent = `${currentPageIndex + 1} / ${imageFiles.length}`;
            
            // 상단 진행바 업데이트
            const progressPercent = ((currentPageIndex + 1) / imageFiles.length) * 100;
            progressBar.style.width = `${progressPercent}%`;

            // 맨 처음, 맨 끝에서는 버튼 비활성화 처리
            btnPrev.disabled = currentPageIndex === 0;
            btnNext.disabled = currentPageIndex === imageFiles.length - 1;
        }

        function changePage(direction) {
            const newIndex = currentPageIndex + direction;
            if (newIndex >= 0 && newIndex < imageFiles.length) {
                currentPageIndex = newIndex;
                updateUI();
                
                // 페이지 넘겼을 때 안내 문구 숨기기
                if (swipeHint.style.opacity !== '0') {
                    swipeHint.style.transition = 'opacity 0.5s';
                    swipeHint.style.opacity = '0';
                }
            }
        }

        // 마우스 클릭 시 다음 페이지 이동 지원 (이미지 영역)
        bookImage.addEventListener('click', (e) => {
            // 이미지의 우측 클릭은 다음, 좌측 클릭은 이전 (옵션)
            const clickX = e.offsetX;
            const imgWidth = bookImage.clientWidth;
            if(clickX > imgWidth / 2) {
                changePage(1); // 우측 클릭 시 다음
            } else {
                changePage(-1); // 좌측 클릭 시 이전
            }
        });

        // 방향키 이벤트
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                changePage(-1);
            } else if (e.key === 'ArrowRight') {
                changePage(1);
            }
        });

        // 스마트폰 터치/스와이프 이벤트
        let touchStartX = 0;
        let touchEndX = 0;

        bookViewer.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        bookViewer.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            const threshold = 50; 
            if (touchEndX < touchStartX - threshold) {
                // 오른쪽에서 왼쪽으로 스와이프 => 다음
                changePage(1);
            }
            if (touchEndX > touchStartX + threshold) {
                // 왼쪽에서 오른쪽으로 스와이프 => 이전
                changePage(-1);
            }
        }

        // 최초 실행
        updateUI();
        
        // 안내 문구는 5초 뒤 자동 숨김 처리
        setTimeout(() => {
            swipeHint.style.transition = 'opacity 1s';
            swipeHint.style.opacity = '0';
        }, 5000);
    </script>
</body>
</html>
