<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연산 연습 | 구몬식 수학</title>
    <link rel="stylesheet" href="../assets/css/math_common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --kumon-pale: #fdfdfd;
            --kumon-border: #e0e0e0;
            --kumon-accent: #ff4d4d;
            --kumon-blue: #007bff;
        }

        body {
            background: #fdfdfd;
            color: #333;
            font-family: 'Pretendard', sans-serif;
            background-image: 
                linear-gradient(var(--kumon-border) 1px, transparent 1px),
                linear-gradient(90deg, var(--kumon-border) 1px, transparent 1px);
            background-size: 50px 50px;
            background-color: #fff;
        }

        .paper-container {
            max-width: 600px;
            margin: 40px auto;
            background: #fff;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid var(--kumon-border);
            position: relative;
            min-height: 80vh;
        }

        .paper-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 10px;
            background: repeating-linear-gradient(45deg, #eee, #eee 10px, #fdfdfd 10px, #fdfdfd 20px);
            border-bottom: 1px solid var(--kumon-border);
        }

        .top-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        .grade-set {
            font-size: 1.2rem;
            font-weight: 800;
        }

        .user-info-fields {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
        }

        .field {
            border-bottom: 1px solid #333;
            min-width: 80px;
            text-align: center;
        }

        .problem-list {
            counter-reset: problem-counter;
        }

        .problem-item {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            font-size: 1.4rem;
            font-weight: 700;
            position: relative;
        }

        .problem-item::before {
            counter-increment: problem-counter;
            content: "(" counter(problem-counter) ")";
            margin-right: 15px;
            font-size: 1.1rem;
            color: #666;
            width: 30px;
        }

        .problem-q {
            flex-grow: 1;
            letter-spacing: 2px;
        }

        .problem-input {
            width: 100px;
            height: 45px;
            border: 2px solid #333;
            text-align: center;
            font-size: 1.4rem;
            font-weight: 800;
            outline: none;
            transition: all 0.2s;
        }

        .problem-input:focus {
            background: #fff9db;
            border-color: var(--kumon-accent);
        }

        .problem-input.correct {
            border-color: var(--kumon-blue);
            color: var(--kumon-blue);
        }

        .problem-input.incorrect {
            border-color: var(--kumon-accent);
            color: var(--kumon-accent);
        }

        .result-mark {
            position: absolute;
            right: -30px;
            font-size: 2rem;
            display: none;
        }

        .result-mark.correct {
            display: block;
            color: rgba(0, 123, 255, 0.4);
            transform: rotate(-10deg);
        }
        
        .result-mark.correct::after {
            content: "○";
        }

        .result-mark.incorrect {
            display: block;
            color: rgba(255, 77, 77, 0.4);
            transform: rotate(15deg);
        }
        
        .result-mark.incorrect::after {
            content: "×";
        }

        .footer-btns {
            margin-top: 50px;
            display: flex;
            gap: 15px;
        }

        .btn-kumon {
            flex: 1;
            padding: 15px;
            font-weight: 800;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid #333;
            background: #fff;
            transition: all 0.2s;
        }

        .btn-kumon:hover {
            background: #f0f0f0;
        }

        .btn-kumon.primary {
            background: #333;
            color: #fff;
        }

        .btn-kumon.primary:hover {
            background: #000;
        }

        .selector-screen {
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
        }

        .set-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 30px;
        }

        .set-btn {
            padding: 15px;
            border: 1px solid #ddd;
            background: #fff;
            cursor: pointer;
            font-weight: 700;
            border-radius: 8px;
        }

        .set-btn:hover {
            background: #f8fbff;
            border-color: var(--kumon-blue);
        }

        .set-btn.completed {
            background: #e7f3ff;
            color: #007bff;
            border-color: #007bff;
        }

        .grade-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .grade-tab {
            padding: 10px 20px;
            border: none;
            background: #eee;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
        }

        .grade-tab.active {
            background: var(--kumon-blue);
            color: #fff;
        }

        .scoring-overlay {
            position: absolute;
            top: 20px;
            right: 40px;
            border: 4px solid var(--kumon-accent);
            color: var(--kumon-accent);
            padding: 10px 20px;
            font-size: 2.5rem;
            font-weight: 900;
            border-radius: 50%;
            transform: rotate(15deg);
            display: none;
        }

        .retry-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .retry-modal {
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .retry-modal .jihun-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 16px;
        }

        .retry-modal .jihun-name {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--kumon-blue);
            margin-bottom: 20px;
        }

        .retry-modal .score-msg {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .retry-modal .encourage-msg {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .retry-modal .retry-btn {
            margin-top: 24px;
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: 800;
            background: var(--kumon-blue);
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        .retry-modal .retry-btn:hover {
            background: #0062cc;
        }

        /* Responsive */
        @media (max-width: 650px) {
            .paper-container {
                margin: 10px;
                padding: 20px;
            }
            .problem-input {
                width: 80px;
            }
            .set-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="header-nav">
            <a href="../index.html" class="btn-back"><i class="fas fa-arrow-left"></i> 메인으로 돌아가기</a>
        </div>

        <div id="selector-screen" class="selector-screen">
            <h1 style="margin-bottom: 10px;">연산 탄탄! 매일매일 수학</h1>
            <p style="color: #666; margin-bottom: 40px;">라희야, 오늘은 어떤 세트를 풀어볼까?</p>

            <div class="grade-tabs">
                <button class="grade-tab active" onclick="switchGrade(1)">중1</button>
                <button class="grade-tab" onclick="switchGrade(2)">중2</button>
                <button class="grade-tab" onclick="switchGrade(3)">중3</button>
            </div>

            <div id="set-grid" class="set-grid">
                <!-- Sets will be loaded here -->
            </div>
        </div>

        <div id="practice-screen" style="display: none;">
            <div class="paper-container">
                <div id="scoring-overlay" class="scoring-overlay">100</div>
                <div class="top-info">
                    <div class="grade-set">
                        <span id="display-grade">중1</span> - <span id="display-set">SET 01</span>
                    </div>
                    <div class="user-info-fields">
                        <div style="display:flex; align-items:center; gap:5px;">날짜: <div class="field" id="today-date"></div></div>
                        <div style="display:flex; align-items:center; gap:5px;">이름: <div class="field" id="user-name-field">라희</div></div>
                    </div>
                </div>

                <div id="problem-list" class="problem-list">
                    <!-- Problems will be loaded here -->
                </div>

                <div class="footer-btns">
                    <button class="btn-kumon" onclick="backToSelector()">목록으로</button>
                    <button class="btn-kumon primary" id="submit-btn" onclick="checkAnswers()">다 풀었어요!</button>
                </div>
            </div>
        </div>

        <!-- 틀렸을 때 박지훈 응원 모달 -->
        <div id="retry-overlay" class="retry-overlay" style="display: none;">
            <div class="retry-modal">
                <img src="../assets/images/pjh3.jpeg" alt="박지훈" class="jihun-img">
                <div class="jihun-name">박지훈</div>
                <div class="score-msg" id="retry-score-msg"></div>
                <div class="encourage-msg">그것만으로도 대견해요! 👏</div>
                <div class="encourage-msg">오빠랑 다시 풀어보자!</div>
                <button class="retry-btn" onclick="resetAndRetry()">다시 풀기</button>
            </div>
        </div>

        <!-- 다 맞췄을 때 박지훈 축하 모달 -->
        <div id="success-overlay" class="retry-overlay" style="display: none;">
            <div class="retry-modal">
                <img src="../assets/images/pjh.jpeg" alt="박지훈" class="jihun-img">
                <div class="jihun-name">박지훈</div>
                <div class="encourage-msg" id="success-msg">해냈어! 라희 대단해! 🎉</div>
                <button class="retry-btn" onclick="closeSuccessAndBack()">다른 세트 풀기</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../env.js"></script>
    <script src="../assets/js/supabase_service.js"></script>
    <script>
        let currentGrade = 1;
        let mathData = null;
        let currentSet = null;
        let isRetry = false;  // 틀린 뒤 다시 풀기 시 true

        document.getElementById('today-date').innerText = new Date().toLocaleDateString();

        async function syncMathDrillFromSupabase() {
            const rows = await pullProgress();
            rows.forEach(row => {
                if (row.storage_key && row.storage_key.startsWith('math_drill_')) {
                    localStorage.setItem(row.storage_key, row.completed_at || '1');
                }
            });
        }

        async function loadMathData(grade) {
            currentGrade = grade;
            await syncMathDrillFromSupabase();
            const filename = `data/middle${grade}_math_sets.json`;
            try {
                const response = await fetch(filename);
                mathData = await response.json();
                renderSetGrid();
            } catch (error) {
                console.error('Error loading math data:', error);
            }
        }

        function switchGrade(grade) {
            document.querySelectorAll('.grade-tab').forEach((tab, idx) => {
                tab.classList.toggle('active', (idx + 1) === grade);
            });
            loadMathData(grade);
        }

        function renderSetGrid() {
            const grid = document.getElementById('set-grid');
            grid.innerHTML = '';
            
            // Assume 20 sets per grade
            for (let i = 1; i <= 20; i++) {
                const isCompleted = localStorage.getItem(`math_drill_g${currentGrade}_s${i}`);
                const btn = document.createElement('button');
                btn.className = `set-btn ${isCompleted ? 'completed' : ''}`;
                btn.innerText = `SET ${i}`;
                btn.onclick = () => startPractice(i);
                grid.appendChild(btn);
            }
        }

        function startPractice(setNum) {
            const setData = mathData.sets.find(s => s.set === setNum);
            if (!setData) {
                alert('해당 세트 정보를 불러올 수 없습니다.');
                return;
            }

            currentSet = setData;
            document.getElementById('display-grade').innerText = `중${currentGrade}`;
            document.getElementById('display-set').innerText = `SET ${String(setNum).padStart(2, '0')}`;
            
            const list = document.getElementById('problem-list');
            list.innerHTML = '';

            setData.problems.forEach((prob, index) => {
                const item = document.createElement('div');
                item.className = 'problem-item';
                item.innerHTML = `
                    <div class="problem-q">${prob.q.replace(/×/g, ' × ').replace(/÷/g, ' ÷ ').replace(/\+/g, ' + ').replace(/-/g, ' - ')} = </div>
                    <input type="number" class="problem-input" data-answer="${prob.answer}" onkeydown="handleKey(event, ${index})">
                    <div class="result-mark"></div>
                `;
                list.appendChild(item);
            });

            document.getElementById('selector-screen').style.display = 'none';
            document.getElementById('practice-screen').style.display = 'block';
            document.getElementById('scoring-overlay').style.display = 'none';
            document.getElementById('retry-overlay').style.display = 'none';
            document.getElementById('success-overlay').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'block';
            isRetry = false;
            
            // Focus first input
            setTimeout(() => {
                document.querySelector('.problem-input').focus();
            }, 100);
        }

        function handleKey(e, index) {
            if (e.key === 'Enter') {
                const inputs = document.querySelectorAll('.problem-input');
                if (index < inputs.length - 1) {
                    inputs[index + 1].focus();
                } else {
                    checkAnswers();
                }
            }
        }

        function checkAnswers() {
            const inputs = document.querySelectorAll('.problem-input');
            let correctCount = 0;
            const EPSILON = 0.001;  // 소수 채점 시 부동소수점 오차 허용

            inputs.forEach(input => {
                const userAnswer = parseFloat(input.value);
                const correctAnswer = parseFloat(input.getAttribute('data-answer'));
                const mark = input.parentElement.querySelector('.result-mark');
                const isCorrect = !isNaN(userAnswer) && (userAnswer === correctAnswer || Math.abs(userAnswer - correctAnswer) < EPSILON);

                if (isCorrect) {
                    input.classList.add('correct');
                    input.classList.remove('incorrect');
                    mark.className = 'result-mark correct';
                    correctCount++;
                } else {
                    input.classList.add('incorrect');
                    input.classList.remove('correct');
                    mark.className = 'result-mark incorrect';
                }
            });

            const score = Math.round((correctCount / inputs.length) * 100);
            const totalCount = inputs.length;
            const overlay = document.getElementById('scoring-overlay');
            overlay.innerText = score;
            overlay.style.display = 'block';
            document.getElementById('submit-btn').style.display = 'none';

            if (score === 100) {
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 }
                });
                // Save progress
                const setNum = parseInt(document.getElementById('display-set').innerText.replace('SET ', ''));
                const key = `math_drill_g${currentGrade}_s${setNum}`;
                const completedAt = new Date().toISOString();
                localStorage.setItem(key, completedAt);
                pushProgress(key, completedAt);
                // 박지훈 축하 모달
                const msgEl = document.getElementById('success-msg');
                msgEl.innerText = isRetry ? '열심히 노력해서 결국 해냈어! 라희 대단해! 🎉' : '해냈어! 라희 대단해! 🎉';
                setTimeout(() => {
                    document.getElementById('success-overlay').style.display = 'flex';
                }, 800);
            } else {
                // 틀렸을 때: 박지훈 모달 표시
                document.getElementById('retry-score-msg').innerText = `${correctCount}문제 맞췄어요! (${correctCount}/${totalCount})`;
                document.getElementById('retry-overlay').style.display = 'flex';
            }
        }

        function closeSuccessAndBack() {
            document.getElementById('success-overlay').style.display = 'none';
            backToSelector();
        }

        function resetAndRetry() {
            document.getElementById('retry-overlay').style.display = 'none';
            isRetry = true;
            const inputs = document.querySelectorAll('.problem-input');
            const marks = document.querySelectorAll('.result-mark');
            inputs.forEach(input => {
                input.value = '';
                input.classList.remove('correct', 'incorrect');
            });
            marks.forEach(mark => {
                mark.className = 'result-mark';
            });
            document.getElementById('scoring-overlay').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'block';
            setTimeout(() => document.querySelector('.problem-input').focus(), 100);
        }

        function backToSelector() {
            document.getElementById('selector-screen').style.display = 'block';
            document.getElementById('practice-screen').style.display = 'none';
            renderSetGrid();
        }

        // Initialize
        loadMathData(1);
    </script>
</body>
</html>
