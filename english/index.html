<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>라희의 영단어 마스터 | Premium English</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=Nanum+Square+Round:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 외부 스타일시트 적용 -->
    <link rel="stylesheet" href="../assets/css/english/style.css">
    <link rel="stylesheet" href="../assets/css/english/celebration.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../env.js"></script>
    <script src="../assets/js/supabase_service.js"></script>
    <script src="../assets/js/app_utils.js"></script>
</head>
<body>

    <header>
        <a href="../index.html" class="back-btn"><i class="fas fa-chevron-left"></i> 학습 홈으로</a>
        <h1>영단어 마스터 📖</h1>
    </header>

    <div class="container">
        
        <!-- 로딩 -->
        <div id="loading">
            <div class="spinner"></div>
            단어 데이터를 불러오는 중입니다... 서버 연결을 확인해 주세요.
        </div>

        <!-- 1. Day 선택 화면 -->
        <div id="day-selector"></div>

        <!-- 2. 학습 화면 컨테이너 (사이드바 + 메인) -->
        <div id="study-container">
            
            <!-- 왼쪽: 단어 리스트 및 상태 -->
            <div class="sidebar">
                <h3>단어 체크리스트</h3>
                <ul class="word-list" id="sidebar-word-list">
                    <!-- JS로 채워짐 -->
                </ul>
                <button class="btn-start-test" id="btn-start-test">✏️ 빈칸 채우기</button>
                <button class="btn-start-choice-quiz" id="btn-start-choice-quiz">📝 4지선다 퀴즈</button>
            </div>

            <!-- 오른쪽: 플래시카드 & 테스트 메인 보드 -->
            <div class="main-content">
                <div class="study-header">
                    <h2 id="current-day-title">Day ?</h2>
                    <button id="return-btn">목록으로</button>
                </div>
                
                <div class="progress-bar-container">
                    <div class="progress-bar" id="study-progress"></div>
                </div>

                <!-- 2-A. 플래시카드 뷰어 -->
                <div id="flashcard-viewer">
                    <div class="scene">
                        <div class="card" id="flashcard">
                            <div class="card-face card-front">
                                <div class="word-en-container">
                                    <div id="word-en">Apple</div>
                                    <button class="btn-tts" id="btn-tts-flashcard" title="발음 듣기"><i class="fas fa-volume-up"></i></button>
                                </div>
                                <div class="hint-text">카드를 터치(클릭)하면 뜻이 보여요! <i class="fas fa-hand-pointer"></i></div>
                            </div>
                            <div class="card-face card-back">
                                <div id="word-ko">사과</div>
                                <div id="word-desc">상세 설명</div>
                                <div class="example-container">
                                    <div id="word-example">I eat an apple.</div>
                                    <button class="btn-tts-small" id="btn-tts-example" title="예문 듣기"><i class="fas fa-volume-up"></i></button>
                                </div>
                                <div class="flashcard-input-area">
                                    <input type="text" id="flashcard-word-input" placeholder="영단어를 입력하세요" autocomplete="off" spellcheck="false">
                                    <div id="flashcard-input-feedback" class="input-feedback"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="controls" id="card-controls">
                        <button class="action-btn btn-fail" id="btn-fail"><i class="fas fa-times"></i> 몰라요</button>
                        <button class="action-btn btn-success" id="btn-success"><i class="fas fa-check"></i> 다 외웠어요!</button>
                    </div>
                </div>

                <!-- 2-B. 단어 테스트 뷰어 -->
                <div id="test-viewer">
                    <div class="test-card">
                        <h3 class="test-title" id="test-mode-title">단어 빈칸 채우기 퀴즈</h3>
                        <div id="test-ko">사과</div>
                        <div id="test-desc">설명</div>
                        <!-- 빈칸 채우기 모드 -->
                        <div id="test-blank-area">
                            <div id="test-example">I eat an [     ].</div>
                            <div class="test-input-area">
                                <input type="text" id="test-input" placeholder="스펠링을 입력하세요" autocomplete="off">
                                <button id="btn-test-submit">확인</button>
                            </div>
                        </div>
                        <!-- 4지선다 모드 -->
                        <div id="test-choice-area" class="choice-options" style="display:none;">
                            <button class="choice-btn" data-choice="0">A</button>
                            <button class="choice-btn" data-choice="1">B</button>
                            <button class="choice-btn" data-choice="2">C</button>
                            <button class="choice-btn" data-choice="3">D</button>
                        </div>
                        <div id="test-feedback"></div>
                    </div>
                    <div class="test-controls">
                        <button id="btn-test-exit">종료하고 단어장으로</button>
                        <button id="btn-test-next">다음 문제 ➔</button>
                    </div>
                </div>

            </div>
        </div>

        <!-- 3. 결과 화면 -->
        <div id="result-view">
            <h2>🎉 수고했어요!</h2>
            <p><span id="result-day">Day 1</span>의 모든 학습을 마쳤습니다.</p>
            <div style="font-size: 5rem; margin-bottom: 20px;">🤩🏅</div>
            <button class="action-btn btn-success" id="btn-finish" style="width: 100%; max-width: 300px; margin: 0 auto;">다른 Day 학습하기</button>
        </div>

    </div>

    <script>
        // 전역 변수
        let wordData = null; 
        let currentDayKey = null; 
        let currentWordsList = []; 
        let currentWordIndex = 0; 
        
        // 학습(다 외웠어요) 완료된 단어들의 ID 배열 기록
        let learnedWordIds = []; 
        
        let isTestMode = false;
        let testMode = 'blank'; // 'blank' | 'choice'
        let testQuestionsList = [];
        let currentTestIndex = 0;
        let currentChoiceOptions = []; // 4지선다 현재 보기들

        const KEY_PREFIX = 'eng_learned_v2_'; // 각 Day 별 외운 단어 ID 배열 저장용

        // DOM Elements
        const loadingEl = document.getElementById('loading');
        const daySelectorEl = document.getElementById('day-selector');
        const studyContainerEl = document.getElementById('study-container');
        const flashcardViewerEl = document.getElementById('flashcard-viewer');
        const testViewerEl = document.getElementById('test-viewer');
        const resultViewEl = document.getElementById('result-view');
        
        const sidebarListEl = document.getElementById('sidebar-word-list');
        const progressBarEl = document.getElementById('study-progress');
        const cardEl = document.getElementById('flashcard');
        const controlsEl = document.getElementById('card-controls');
        
        // Test Elements
        const testInputEl = document.getElementById('test-input');
        const testFeedbackEl = document.getElementById('test-feedback');
        const btnTestNextEl = document.getElementById('btn-test-next');

        // Supabase에서 단어 완료 내역 가져와 localStorage에 반영
        async function syncEngWordsFromSupabase() {
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (k && k.startsWith('rahee_eng_learned_v2_')) {
                    const v = localStorage.getItem(k);
                    localStorage.setItem(k.replace('rahee_eng_learned_v2_', 'eng_learned_v2_'), v);
                    localStorage.removeItem(k);
                }
            }
            const rows = await pullProgress();
            rows.forEach(row => {
                const engKey = row.storage_key && (row.storage_key.startsWith('eng_learned_v2_') || row.storage_key.startsWith('rahee_eng_learned_v2_'));
                if (engKey && row.payload && Array.isArray(row.payload.word_ids)) {
                    const newKey = row.storage_key.replace(/^rahee_eng_learned_v2_/, 'eng_learned_v2_');
                    const stored = localStorage.getItem(newKey);
                    const localIds = stored ? JSON.parse(stored) : [];
                    const merged = [...new Set([...localIds, ...row.payload.word_ids])];
                    localStorage.setItem(newKey, JSON.stringify(merged));
                }
            });
        }

        // 앱 초기화
        async function initApp() {
            try {
                await syncEngWordsFromSupabase();
                let path = window.location.pathname;
                if (path.match(/\.[^/]+$/)) {
                    path = path.replace(/\/[^/]*$/, '/');
                } else {
                    path = path.endsWith('/') ? path : path + '/';
                }
                const fetchUrl = window.location.origin + path + 'data/words.json';
                
                const response = await fetch(fetchUrl);
                
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                wordData = await response.json();
                loadingEl.style.display = 'none';
                renderDaySelector();
            } catch (error) {
                console.error("Fetch Error:", error);
                const isFile = window.location.protocol === 'file:';
                const hint = isFile ? '<br><small>file://로 열면 fetch가 차단됩니다. 터미널에서 <code>npx serve</code> 실행 후 접속하세요.</small>' : '';
                loadingEl.innerHTML = `<div style="color:red; padding:20px;">데이터 로딩 실패! (404)<br>words.json 파일을 확인해 주세요.${hint}</div>`;
            }
        }

        // --- TTS (Text to Speech) 기능 ---
        let voices = [];
        let englishVoice = null;
        
        window.speechSynthesis.onvoiceschanged = () => {
            voices = window.speechSynthesis.getVoices();
            // 자연스러운 미국 영어 여성 목소리 추천
            englishVoice = voices.find(v => v.name === 'Google US English') ||
                           voices.find(v => v.name === 'Samantha') ||
                           voices.find(v => v.lang === 'en-US' && v.name.includes('Female')) ||
                           voices.find(v => v.lang === 'en-US');
        };

        function playTTS(text) {
            // 기존 발음 중지
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85; // 라희를 위해 조금 더 천천히, 명확하게 읽기
            utterance.pitch = 1.1; // 약간 높은 톤으로 밝은 느낌
            
            if (voices.length === 0) {
                 voices = window.speechSynthesis.getVoices();
                 englishVoice = voices.find(v => v.name === 'Google US English') ||
                                  voices.find(v => v.name === 'Samantha') ||
                                  voices.find(v => v.lang === 'en-US' && v.name.includes('Female')) ||
                                  voices.find(v => v.lang === 'en-US');
            }

            if (englishVoice) {
                utterance.voice = englishVoice;
            }
            
            window.speechSynthesis.speak(utterance);
        }

        // 플래시카드 발음 듣기 이벤트
        document.getElementById('btn-tts-flashcard').addEventListener('click', (e) => {
            e.stopPropagation(); // 카드 뒤집기 방지
            const word = currentWordsList[currentWordIndex].en;
            playTTS(word);
        });

        // 예문 발음 듣기 이벤트
        document.getElementById('btn-tts-example').addEventListener('click', (e) => {
            e.stopPropagation(); // 카드 뒤집기 방지
            const example = currentWordsList[currentWordIndex].example;
            playTTS(example);
        });

        // 1. Day 선택기 렌더링
        function renderDaySelector() {
            daySelectorEl.style.display = 'grid';
            studyContainerEl.style.display = 'none';
            resultViewEl.style.display = 'none';
            daySelectorEl.innerHTML = '';
            
            for (const dayKey in wordData) {
                const dayNumber = dayKey.replace('day', '');
                const totalWords = wordData[dayKey].length;
                
                // 해당 day에 저장된 익힌 단어 아이디 수
                const stored = localStorage.getItem(KEY_PREFIX + dayKey);
                const learnedCount = stored ? JSON.parse(stored).length : 0;
                const isCompleted = learnedCount >= totalWords;

                const dayCard = document.createElement('div');
                dayCard.className = `day-card ${isCompleted ? 'completed' : ''}`;
                dayCard.innerHTML = `
                    <div class="day-title">Day ${dayNumber}</div>
                    <div class="day-progress">${learnedCount} / ${totalWords} 단어</div>
                `;
                dayCard.addEventListener('click', () => startStudy(dayKey, dayNumber));
                daySelectorEl.appendChild(dayCard);
            }
        }

        // 2. 학습 시작 (Day 선택 시)
        function startStudy(dayKey, dayNumber) {
            currentDayKey = dayKey;
            currentWordsList = wordData[dayKey];
            isTestMode = false;
            
            // 저장소에서 외운 단어 목록 가져오기
            const stored = localStorage.getItem(KEY_PREFIX + dayKey);
            learnedWordIds = stored ? JSON.parse(stored) : [];

            // UI 전환
            daySelectorEl.style.display = 'none';
            resultViewEl.style.display = 'none';
            studyContainerEl.style.display = 'flex';
            flashcardViewerEl.style.display = 'flex';
            testViewerEl.style.display = 'none';
            
            document.getElementById('current-day-title').innerText = `Day ${dayNumber}`;
            document.getElementById('result-day').innerText = `Day ${dayNumber}`;
            
            renderSidebar();
            
            // 첫 번째 안 외운 단어 찾기
            currentWordIndex = currentWordsList.findIndex(w => !learnedWordIds.includes(w.id));
            if (currentWordIndex === -1) currentWordIndex = 0; // 다 외웠으면 첫 단어 선택

            selectWord(currentWordIndex);
        }

        // 3. 사이드바 렌더링
        function renderSidebar() {
            sidebarListEl.innerHTML = '';
            
            currentWordsList.forEach((word, index) => {
                const li = document.createElement('li');
                const isLearned = learnedWordIds.includes(word.id);
                
                li.className = `word-item ${isLearned ? 'checked' : ''}`;
                li.dataset.index = index;
                
                li.innerHTML = `
                    <i class="fas fa-check-circle check-icon"></i>
                    <div class="word-text">
                        <span class="word-en-list">${word.en}</span>
                        <span class="word-ko-list">${word.ko}</span>
                    </div>
                `;
                
                li.addEventListener('click', () => {
                    selectWord(index);
                    playTTS(word.en);
                });
                sidebarListEl.appendChild(li);
            });
            updateProgress();
        }

        // 프로그래스바 & 전체 완료 체크
        function updateProgress() {
            const percentage = (learnedWordIds.length / currentWordsList.length) * 100;
            progressBarEl.style.width = `${percentage}%`;
            
            // 모든 단어 다 외웠을 때 축하 팝업(결과화면) 띄움
            if (learnedWordIds.length === currentWordsList.length && !isTestMode) {
                setTimeout(showCompleteView, 500);
            }
        }

        // 단어 선택 시 (클릭 또는 자동)
        function selectWord(index) {
            currentWordIndex = index;
            
            // 사이드바 하이라이트 변경
            document.querySelectorAll('.word-item').forEach(el => el.classList.remove('active'));
            const activeLi = sidebarListEl.children[index];
            if(activeLi) {
                activeLi.classList.add('active');
                activeLi.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            // 플래시카드 업데이트
            if (cardEl.classList.contains('is-flipped')) {
                cardEl.classList.remove('is-flipped');
                setTimeout(setCardText, 300);
            } else {
                setCardText();
            }
            controlsEl.classList.remove('visible');
        }

        function setCardText() {
            const word = currentWordsList[currentWordIndex];
            document.getElementById('word-en').innerText = word.en || "";
            document.getElementById('word-ko').innerText = word.ko || "";
            document.getElementById('word-desc').innerText = word.desc || "";
            document.getElementById('word-example').innerText = word.example || "";
            const inputEl = document.getElementById('flashcard-word-input');
            const feedbackEl = document.getElementById('flashcard-input-feedback');
            if (inputEl) { inputEl.value = ""; inputEl.classList.remove('input-error'); }
            if (feedbackEl) { feedbackEl.textContent = ""; feedbackEl.className = "input-feedback"; }
        }

        // --- 플래시카드 조작 ---
        cardEl.addEventListener('click', () => {
            cardEl.classList.toggle('is-flipped');
            if (cardEl.classList.contains('is-flipped')) {
                controlsEl.classList.add('visible');
                setTimeout(() => document.getElementById('flashcard-word-input')?.focus(), 350);
            } else {
                controlsEl.classList.remove('visible');
            }
        });

        // 다 외웠어요 버튼 (정답 입력 시에만 처리)
        function tryMarkAsLearned() {
            const word = currentWordsList[currentWordIndex];
            const inputEl = document.getElementById('flashcard-word-input');
            const feedbackEl = document.getElementById('flashcard-input-feedback');
            const userInput = (inputEl?.value || "").trim().toLowerCase();
            const correct = (word.en || "").trim().toLowerCase();
            if (userInput !== correct) {
                feedbackEl.textContent = "틀렸어요. 다시 입력해보세요!";
                feedbackEl.className = "input-feedback error";
                inputEl?.classList.add('input-error');
                inputEl?.focus();
                return;
            }
            feedbackEl.textContent = "";
            feedbackEl.className = "input-feedback";
            inputEl?.classList.remove('input-error');
            const wordId = word.id;
            if (!learnedWordIds.includes(wordId)) {
                learnedWordIds.push(wordId);
                localStorage.setItem(KEY_PREFIX + currentDayKey, JSON.stringify(learnedWordIds));
                pushProgress(KEY_PREFIX + currentDayKey, new Date().toISOString(), { word_ids: learnedWordIds });
            }
            renderSidebar();
            moveToNextUnlearned();
        }
        document.getElementById('btn-success').addEventListener('click', (e) => {
            e.stopPropagation();
            tryMarkAsLearned();
        });
        const flashcardInputEl = document.getElementById('flashcard-word-input');
        flashcardInputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                tryMarkAsLearned();
            }
        });
        document.querySelector('.flashcard-input-area')?.addEventListener('click', (e) => e.stopPropagation());

        // 몰라요 버튼
        document.getElementById('btn-fail').addEventListener('click', (e) => {
            e.stopPropagation();
            moveToNextWord();
        });

        function moveToNextUnlearned() {
            // 아직 안 외운 다음 단어 찾기
            let nextIndex = currentWordsList.findIndex((w, i) => i > currentWordIndex && !learnedWordIds.includes(w.id));
            if (nextIndex === -1 && learnedWordIds.length < currentWordsList.length) {
                // 뒤에 안 외운 게 없으면 처음부터 다시 스캔
                nextIndex = currentWordsList.findIndex(w => !learnedWordIds.includes(w.id));
            }
            
            if (nextIndex !== -1) {
                selectWord(nextIndex);
            }
        }
        
        function moveToNextWord() {
            if (currentWordIndex < currentWordsList.length - 1) {
                selectWord(currentWordIndex + 1);
            } else {
                selectWord(0);
            }
        }

        function showCompleteView() {
            playCuteSound();
            fireConfetti();
            studyContainerEl.style.display = 'none';
            resultViewEl.style.display = 'block';
        }

        // --- 단어 테스트 로직 ---
        document.getElementById('btn-start-test').addEventListener('click', startTestMode);
        document.getElementById('btn-start-choice-quiz').addEventListener('click', startChoiceQuiz);
        document.getElementById('btn-test-exit').addEventListener('click', exitTestMode);
        
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }
        
        function startTestMode() {
            isTestMode = true;
            testMode = 'blank';
            testQuestionsList = [...currentWordsList];
            currentTestIndex = 0;
            flashcardViewerEl.style.display = 'none';
            testViewerEl.style.display = 'flex';
            document.getElementById('test-mode-title').innerText = '단어 빈칸 채우기 퀴즈';
            document.getElementById('test-blank-area').style.display = 'block';
            document.getElementById('test-choice-area').style.display = 'none';
            progressBarEl.style.width = '0%';
            loadTestQuestion();
        }
        
        function startChoiceQuiz() {
            isTestMode = true;
            testMode = 'choice';
            testQuestionsList = shuffle([...currentWordsList]);
            currentTestIndex = 0;
            flashcardViewerEl.style.display = 'none';
            testViewerEl.style.display = 'flex';
            document.getElementById('test-mode-title').innerText = '4지선다 퀴즈';
            document.getElementById('test-blank-area').style.display = 'none';
            document.getElementById('test-choice-area').style.display = 'grid';
            progressBarEl.style.width = '0%';
            loadChoiceQuestion();
        }
        
        function exitTestMode() {
            isTestMode = false;
            testMode = 'blank';
            testViewerEl.style.display = 'none';
            flashcardViewerEl.style.display = 'flex';
            updateProgress();
            selectWord(currentWordIndex);
        }

        function loadChoiceQuestion() {
            const word = testQuestionsList[currentTestIndex];
            document.getElementById('test-ko').innerText = word.ko;
            document.getElementById('test-desc').innerText = word.desc;
            testFeedbackEl.innerHTML = '';
            const wrongPool = [...new Set(
                currentWordsList
                    .filter(w => w.en.toLowerCase() !== word.en.toLowerCase())
                    .map(w => w.en)
            )];
            const wrong3 = shuffle(wrongPool).slice(0, 3);
            currentChoiceOptions = shuffle([word.en, ...wrong3]);
            const btns = document.querySelectorAll('.choice-btn');
            btns.forEach((btn, i) => {
                btn.textContent = currentChoiceOptions[i] || '';
                btn.style.display = currentChoiceOptions[i] ? 'block' : 'none';
                btn.disabled = false;
                btn.className = 'choice-btn';
            });
            progressBarEl.style.width = `${(currentTestIndex / testQuestionsList.length) * 100}%`;
        }
        
        function loadTestQuestion() {
            const word = testQuestionsList[currentTestIndex];
            
            document.getElementById('test-ko').innerText = word.ko;
            document.getElementById('test-desc').innerText = word.desc;
            
            // 예문에서 영어 단어 부분만 밑줄 처리
            let blankExample = word.example || '';
            if (word.example) {
                const exactRegex = new RegExp(`\\b${word.en}\\b`, 'gi');
                if (exactRegex.test(word.example)) {
                    // 1. 정확히 일치하는 경우 (예: accept -> accept)
                    blankExample = word.example.replace(exactRegex, "________");
                } else if (word.en.length >= 3) {
                    // 2. 어미 변화가 있는 경우 (예: achieve -> achieved, apply -> applied)
                    // 앞부분(어근)이 70% 이상 일치하는 가장 비슷한 단어를 찾아 치환
                    const stem = word.en.length > 4 ? word.en.slice(0, -2) : word.en.slice(0, -1);
                    const fuzzyRegex = new RegExp(`\\b${stem}[a-z]{0,5}\\b`, 'gi');
                    blankExample = word.example.replace(fuzzyRegex, "________");
                }
            }            
            document.getElementById('test-example').innerText = blankExample;
            
            // UI 리셋
            testInputEl.value = '';
            testInputEl.className = '';
            testInputEl.disabled = false;
            testFeedbackEl.innerHTML = '';
            btnTestNextEl.style.display = 'none';
            document.getElementById('btn-test-submit').style.display = 'block';
            
            // 진행도 표시
            progressBarEl.style.width = `${(currentTestIndex / testQuestionsList.length) * 100}%`;
            
            setTimeout(() => testInputEl.focus(), 100);
        }

        document.getElementById('btn-test-submit').addEventListener('click', checkAnswer);
        testInputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAnswer();
        });

        function checkAnswer() {
            if (testInputEl.disabled) return;
            
            // 아이폰 자동 변환(스마트 쿼트) 대처: 둥근 따옴표를 일반 따옴표로 변경
            const normalize = (text) => text.replace(/[\u2018\u2019]/g, "'").replace(/[\u201C\u201D]/g, '"').trim();

            const answer = normalize(testInputEl.value).toLowerCase();
            const correctWord = normalize(testQuestionsList[currentTestIndex].en).toLowerCase();
            
            if (answer === correctWord) {
                // 정답
                testInputEl.className = 'success';
                testInputEl.disabled = true;
                testFeedbackEl.innerHTML = '<span class="feedback-success">✅ 정답입니다! 훌륭해요!</span>';
                document.getElementById('btn-test-submit').style.display = 'none';
                
                // 예문 빈칸을 정답 단어로 교체 (초록색 강조)
                const wordObj = testQuestionsList[currentTestIndex];
                const regex = new RegExp(`\\b${wordObj.en}\\b`, 'gi');
                let highlightExample = wordObj.example.replace(regex, `<span class="highlight-success">${wordObj.en}</span>`);
                document.getElementById('test-example').innerHTML = highlightExample;
                
                // 정답 단어 TTS로 읽어주기
                playTTS(wordObj.en);

                btnTestNextEl.style.display = 'block';
                btnTestNextEl.focus();
            } else {
                // 오답
                testInputEl.className = 'error';
                testFeedbackEl.innerHTML = `<span class="feedback-error">❌ 틀렸습니다. 다시 시도해 보세요!</span>`;
                setTimeout(() => {
                    testInputEl.classList.remove('error');
                    testInputEl.focus();
                }, 400);
            }
        }

        document.querySelectorAll('.choice-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (testMode !== 'choice' || btn.disabled) return;
                const idx = parseInt(btn.dataset.choice, 10);
                checkChoiceAnswer(idx);
            });
        });

        function checkChoiceAnswer(clickedIndex) {
            const word = testQuestionsList[currentTestIndex];
            const selected = currentChoiceOptions[clickedIndex];
            const isCorrect = selected.toLowerCase() === word.en.toLowerCase();
            const btns = document.querySelectorAll('.choice-btn');
            btns.forEach((b, i) => {
                b.disabled = true;
                if (currentChoiceOptions[i]?.toLowerCase() === word.en.toLowerCase()) {
                    b.classList.add('correct');
                } else if (i === clickedIndex && !isCorrect) {
                    b.classList.add('wrong');
                }
            });
            if (isCorrect) {
                testFeedbackEl.innerHTML = '<span class="feedback-success">✅ 정답입니다! 훌륭해요!</span>';
                playTTS(word.en);
            } else {
                testFeedbackEl.innerHTML = `<span class="feedback-error">❌ 틀렸어요. 정답: <strong>${word.en}</strong></span>`;
            }
            btnTestNextEl.style.display = 'block';
            btnTestNextEl.focus();
        }

        btnTestNextEl.addEventListener('click', () => {
            currentTestIndex++;
            if (currentTestIndex < testQuestionsList.length) {
                if (testMode === 'choice') loadChoiceQuestion();
                else loadTestQuestion();
            } else {
                progressBarEl.style.width = '100%';
                testFeedbackEl.innerHTML = '<span class="feedback-success">🎉 모든 테스트를 완료했습니다!</span>';
                btnTestNextEl.style.display = 'none';
            }
        });

        // [목록으로] 버튼
        function returnToMenu() {
            studyContainerEl.style.display = 'none';
            resultViewEl.style.display = 'none';
            daySelectorEl.style.display = 'grid';
            renderDaySelector();
        }
        document.getElementById('return-btn').addEventListener('click', returnToMenu);
        document.getElementById('btn-finish').addEventListener('click', returnToMenu);

        // 앱 구동 시작
        initApp();
    </script>
    <script>
        // Check session
        if (typeof requireAuth !== 'undefined') {
            requireAuth();
        }
    </script>
    <script src="../assets/js/celebration.js"></script>
</body>
</html>
