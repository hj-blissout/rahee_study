<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영문법 상세 학습</title>
    <!-- 폰트 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Nanum+Square+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/english/grammar_detail.css">
    <link rel="stylesheet" href="../assets/css/english/celebration.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../env.js"></script>
    <script src="../assets/js/supabase_service.js"></script>
    <script src="../assets/js/app_utils.js"></script>
</head>
<body>

    <header>
        <a href="grammar.html" class="back-btn"><i class="fas fa-arrow-left"></i> 목차로</a>
        <h1>📖 라희의 영문법 노트</h1>
    </header>

    <div class="container">
        <div class="grammar-content-box">
            <div class="grammar-header">
                <div class="grammar-header-left">
                    <div class="unit-badge" id="unit-badge">Unit ?</div>
                    <h2 class="grammar-title" id="grammar-title">로딩 중...</h2>
                </div>
                <div class="grammar-category" id="grammar-category" style="display:none;"></div>
            </div>
            
            <div class="concept-box" id="concept-box">
                이곳은 앞으로 라희를 위한 문법 상세 개념 설명이 들어갈 자리입니다.<br>
                <strong>라희야, 영문법은 단어들의 <span class="highlight">약속</span>이야!</strong> 어떤 약속인지 오빠가 차근차근 설명해 줄게!
            </div>

            <div class="example-section" id="example-section">
                <div class="example-section-header">
                    <h3><i class="fas fa-lightbulb" style="color:#f1c40f"></i> 필수 예문 연습</h3>
                    <button type="button" class="btn-play-all" id="btn-play-all" style="display:none;">
                        <i class="fas fa-play-circle"></i> 예문 전체 듣기
                    </button>
                </div>
                <div id="examples-container">
                    <!-- 예문들이 JS에 의해 여기에 들어갑니다. -->
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-complete" id="btn-complete">
                    <i class="fas fa-check-circle"></i> 다 이해했어요 (완료)
                </button>
            </div>
        </div>
    </div>

    <!-- 타이핑 모달 -->
    <div id="typing-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <h3>따라 쳐보세요! ✍️</h3>
            <button class="speaker-btn" id="modal-speaker-btn"><i class="fas fa-volume-up"></i> 한 번 더 듣기</button>
            <div class="target-en" id="modal-target-en"></div>
            <div class="target-ko" id="modal-target-ko"></div>
            <input type="text" id="typing-input" autocomplete="off" placeholder="위의 영문장을 똑같이 타이핑하세요">
            <div class="feedback-msg" id="typing-feedback"></div>
        </div>
    </div>

    <script>
        // 해시에서 unit 읽기 (#unit=1&title=... - 리다이렉트 시에도 유지됨)
        const hashParams = new URLSearchParams(window.location.hash.slice(1));
        const unitNum = hashParams.get('unit') || '0';
        const rawTitle = hashParams.get('title') || '학습할 챕터를 선택해주세요';
        
        // 화면 초기 업데이트
        document.getElementById('unit-badge').innerText = `Unit ${unitNum}`;
        document.getElementById('grammar-title').innerText = rawTitle;

        // 진행 상태 변수들
        let totalExamples = 0;
        let typedCount = 0;
        let typedStatus = [];
        let currentTypingIndex = -1;
        let currentTargetText = '';
        let currentExamples = [];  // 예문 배열 (순차 재생용)

        // 시작 시 완료 버튼 비활성화
        document.getElementById('btn-complete').disabled = true;

        // TTS 함수
        let voices = [];
        let preferredVoice = null;
        
        window.speechSynthesis.onvoiceschanged = () => {
            voices = window.speechSynthesis.getVoices();
            // 자연스러운 미국 영어 여성 목소리 추천
            preferredVoice = voices.find(v => v.name === 'Google US English') ||
                             voices.find(v => v.name === 'Samantha') ||
                             voices.find(v => v.lang === 'en-US' && v.name.includes('Female')) ||
                             voices.find(v => v.lang === 'en-US');
        };

        function playTTS(text, event) {
            // 이벤트 전파 방지 (모달 열리는 것 방지)
            if (event) event.stopPropagation();
            
            // 기존 발음 중지
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85; // 라희를 위해 조금 더 천천히, 명확하게 읽기
            utterance.pitch = 1.1; // 약간 높은 톤으로 밝은 느낌
            
            if (voices.length === 0) {
                 voices = window.speechSynthesis.getVoices();
                 preferredVoice = voices.find(v => v.name === 'Google US English') ||
                                  voices.find(v => v.name === 'Samantha') ||
                                  voices.find(v => v.lang === 'en-US' && v.name.includes('Female')) ||
                                  voices.find(v => v.lang === 'en-US');
            }

            if (preferredVoice) {
                utterance.voice = preferredVoice;
            }
            
            window.speechSynthesis.speak(utterance);
        }

        // 예문 전체 순차 재생
        function playAllExamplesSequentially() {
            if (currentExamples.length === 0) return;
            const btn = document.getElementById('btn-play-all');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 재생 중...';

            window.speechSynthesis.cancel();
            let index = 0;

            function resetBtn() {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-play-circle"></i> 예문 전체 듣기';
            }

            function playNext() {
                if (index >= currentExamples.length) {
                    resetBtn();
                    return;
                }
                const text = currentExamples[index].en;
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85;
                utterance.pitch = 1.1;
                if (voices.length === 0) voices = window.speechSynthesis.getVoices();
                if (!preferredVoice && voices.length) {
                    preferredVoice = voices.find(v => v.name === 'Google US English') ||
                        voices.find(v => v.name === 'Samantha') ||
                        voices.find(v => v.lang === 'en-US' && v.name.includes('Female')) ||
                        voices.find(v => v.lang === 'en-US');
                }
                if (preferredVoice) utterance.voice = preferredVoice;
                utterance.onend = () => {
                    index++;
                    setTimeout(playNext, 400);  // 문장 사이 간격
                };
                utterance.onerror = resetBtn;
                window.speechSynthesis.speak(utterance);
            }
            playNext();
        }

        // 뜻 보기 토글 함수
        function toggleKo(btn, event) {
            // 모달 열리는 것 방지
            event.stopPropagation();
            
            const koDiv = btn.nextElementSibling;
            if (koDiv.style.display === 'none') {
                koDiv.style.display = 'block';
                btn.innerText = '뜻 숨기기 🙈';
            } else {
                koDiv.style.display = 'none';
                btn.innerText = '뜻 보기 👀';
            }
        }

        // JSON 데이터 불러와서 화면에 채우기
        async function loadGrammarDetail() {
            if (unitNum === '0') {
                document.getElementById('concept-box').innerHTML = `
                    <p>목차에서 학습할 챕터를 선택해주세요.</p>
                    <a href="grammar.html" class="btn btn-complete" style="display:inline-block; margin-top:1rem; text-decoration:none;">
                        <i class="fas fa-list"></i> 목차로 이동
                    </a>
                `;
                document.getElementById('example-section').style.display = 'none';
                return;
            }

            try {
                const baseDir = window.location.href.replace(/\/[^/]*(\?.*)?$/, '/');
                const fetchUrl = baseDir + 'data/grammar_data_rewritten.json';
                
                const response = await fetch(fetchUrl);
                if (!response.ok) throw new Error("File not found");
                const data = await response.json();
                
                const unitData = data[unitNum];
                if (unitData) {
                    // 타이틀, 카테고리 업데이트
                    document.getElementById('grammar-title').innerText = unitData.title;
                    const catEl = document.getElementById('grammar-category');
                    if (unitData.category) {
                        catEl.textContent = unitData.category;
                        catEl.style.display = 'block';
                    } else {
                        catEl.style.display = 'none';
                    }
                    
                    // 개념 설명 업데이트 (rewritten: object / 기존: HTML string)
                    const conceptBox = document.getElementById('concept-box');
                    if (typeof unitData.concept === 'object' && unitData.concept !== null) {
                        const c = unitData.concept;
                        conceptBox.innerHTML = `
                            <div class="concept-situation">
                                <span class="concept-label"><i class="fas fa-film"></i> 상황</span>
                                <p>${c.situation || ''}</p>
                            </div>
                            <div class="concept-explanation">
                                <span class="concept-label"><i class="fas fa-book-open"></i> 설명</span>
                                <p>${c.explanation || ''}</p>
                            </div>
                            <div class="concept-core">
                                <span class="concept-label"><i class="fas fa-lightbulb"></i> 핵심</span>
                                <p>${c.core_feeling || ''}</p>
                            </div>
                        `;
                    } else {
                        conceptBox.innerHTML = unitData.concept || '';
                    }

                    // 예문 전체 듣기 버튼 표시
                    currentExamples = unitData.examples;
                    const btnPlayAll = document.getElementById('btn-play-all');
                    if (currentExamples.length > 0) {
                        btnPlayAll.style.display = 'inline-flex';
                        btnPlayAll.onclick = playAllExamplesSequentially;
                    } else {
                        btnPlayAll.style.display = 'none';
                    }
                    
                    // 예문 업데이트
                    const examplesContainer = document.getElementById('examples-container');
                    examplesContainer.innerHTML = ''; // 초기화
                    
                    totalExamples = unitData.examples.length;
                    typedStatus = new Array(totalExamples).fill(false);
                    typedCount = 0;
                    
                    unitData.examples.forEach((ex, index) => {
                        const card = document.createElement('div');
                        card.className = 'example-card';
                        
                        const safeText = ex.en.replace(/'/g, "\\'");
                        
                        card.innerHTML = `
                            <div class="card-header" style="margin-bottom:0;">
                                <div style="display:flex; align-items:center; gap:10px;">
                                    <button class="speaker-btn" onclick="playTTS('${safeText}', event)"><i class="fas fa-volume-up"></i></button>
                                    <div class="en-text" style="font-size:1.3rem;">${ex.en}</div>
                                </div>
                                <span class="status-icon" id="status-icon-${index}"><i class="far fa-circle"></i></span>
                            </div>
                            <div style="margin-top:10px; margin-left:45px;">
                                <button class="btn-show-ko" onclick="toggleKo(this, event)">뜻 보기 👀</button>
                                <div class="ko-text" style="display:none; margin-top:5px; color:#555;">${ex.ko}</div>
                            </div>
                        `;
                        
                        // 카드 클릭 시 타이핑 모달 오픈
                        card.addEventListener('click', () => openTypingModal(ex.en, ex.ko, index));
                        
                        examplesContainer.appendChild(card);
                    });
                } else {
                    document.getElementById('concept-box').innerHTML = "아직 이 챕터의 상세 강의가 준비되지 않았어요!";
                    document.getElementById('example-section').style.display = 'none';
                }
            } catch (error) {
                console.error("데이터 로드 실패:", error);
                document.getElementById('concept-box').innerHTML = "데이터를 불러오는 중 오류가 발생했습니다.";
            }
        }

        // 데이터 로드 실행
        loadGrammarDetail();

        // 완료 확인
        function checkAllComplete() {
            if (typedCount >= totalExamples && totalExamples > 0) {
                const btn = document.getElementById('btn-complete');
                btn.disabled = false;
                btn.classList.add('ready');
            }
        }

        // 모달 열기
        function openTypingModal(en, ko, index) {
            currentTypingIndex = index;
            currentTargetText = en;
            
            document.getElementById('modal-target-en').innerText = en;
            document.getElementById('modal-target-ko').innerText = ko;
            
            const input = document.getElementById('typing-input');
            input.value = '';
            input.classList.remove('correct', 'wrong');
            document.getElementById('typing-feedback').innerText = '';
            
            document.getElementById('typing-modal').style.display = 'flex';
            setTimeout(() => { input.focus(); }, 100);
            
            // 모달 스피커 버튼 설정
            const safeText = en.replace(/'/g, "\\'");
            document.getElementById('modal-speaker-btn').setAttribute('onclick', `playTTS('${safeText}', event)`);
            
            // 모달 열릴 때 자동 재생 (약간 딜레이를 주어 자연스럽게 시도)
            setTimeout(() => {
                playTTS(en);
            }, 300);
        }

        // 타이핑 로직
        document.getElementById('typing-input').addEventListener('input', (e) => {
            const val = e.target.value;
            const feedback = document.getElementById('typing-feedback');
            
            // 아이폰 스마트 쿼트 대처
            const normalize = (text) => text.replace(/[\u2018\u2019]/g, "'").replace(/[\u201C\u201D]/g, '"').trim();
            const normalizedVal = normalize(val);
            const normalizedTarget = normalize(currentTargetText);
            
            if (normalizedVal === normalizedTarget) {
                e.target.classList.add('correct');
                e.target.classList.remove('wrong');
                feedback.innerText = "정확해요! 👏";
                feedback.style.color = "var(--success-color)";
                
                // 완료 표시
                if (!typedStatus[currentTypingIndex]) {
                    typedStatus[currentTypingIndex] = true;
                    typedCount++;
                    document.getElementById(`status-icon-${currentTypingIndex}`).innerHTML = '<i class="fas fa-check-circle" style="color: var(--success-color);"></i>';
                    
                    // 정답 맞추면 약간 딜레이 후 모달 닫고 완료 체크
                    setTimeout(() => {
                        document.getElementById('typing-modal').style.display = 'none';
                        checkAllComplete();
                    }, 800);
                }
            } else if (normalizedTarget.startsWith(normalizedVal)) {
                e.target.classList.remove('correct', 'wrong');
                feedback.innerText = "계속 타이핑하세요...";
                feedback.style.color = "var(--text-light)";
            } else {
                e.target.classList.add('wrong');
                e.target.classList.remove('correct');
                feedback.innerText = "오타가 있어요! 다시 확인해봐요. (대소문자, 마침표 등 동일해야함)";
                feedback.style.color = "var(--accent-color)";
            }
        });

        // 모달 닫기
        document.getElementById('close-modal').onclick = () => {
            document.getElementById('typing-modal').style.display = 'none';
        };
        window.onclick = (event) => {
            if (event.target == document.getElementById('typing-modal')) {
                document.getElementById('typing-modal').style.display = 'none';
            }
        };

        // 완료 버튼 처리
        document.getElementById('btn-complete').addEventListener('click', () => {
            if (unitNum === '0') return;

            // 저장소에서 완료 목록 가져오기
            let completed = JSON.parse(localStorage.getItem('rahee_grammar_completed') || '[]');
            
            // 아직 없으면 추가!
            if (!completed.includes(unitNum)) {
                completed.push(unitNum);
                localStorage.setItem('rahee_grammar_completed', JSON.stringify(completed));
                // Supabase에 저장
                pushProgress('rahee_grammar_unit_' + unitNum, new Date().toISOString());
            }

            playCuteSound();
            fireConfetti();
            
            // 팝업이 뜬 뒤에 사용자가 [다음에 또 만나요] 버튼을 누르면 인덱스로 이동하게 하고 싶지만,
            // 여기서는 기존 alert과 이동 로직도 유지하되, 버튼 클릭 시 이동하도록 유도
            setTimeout(() => {
                alert(`Unit ${unitNum} 완료! 고생했어 라희야! 👏`);
                window.location.href = 'grammar.html';
            }, 5000); // 팝업 애니메이션 등을 고려하여 넉넉히 대기 후 이동 (수동 제어 위해)
        });
    </script>
    <script>
        if (typeof requireAuth !== 'undefined') {
            requireAuth();
        }
    </script>
    <script src="../assets/js/celebration.js"></script>
</body>
</html>
